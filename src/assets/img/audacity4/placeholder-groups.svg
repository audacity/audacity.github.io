<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="350" rx="8" fill="#f8fafc"/>

  <!-- Timeline Ruler -->
  <rect x="0" y="0" width="800" height="24" rx="8" fill="#e2e8f0"/>
  <rect x="0" y="16" width="800" height="8" fill="#e2e8f0"/>
  <text x="50" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:00</text>
  <text x="200" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:05</text>
  <text x="350" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:10</text>
  <text x="500" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:15</text>
  <text x="650" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:20</text>

  <!-- Track 1 area -->
  <rect x="0" y="24" width="800" height="100" fill="#f8fafc"/>

  <!-- Track 2 area -->
  <rect x="0" y="124" width="800" height="1" fill="#e2e8f0"/>
  <rect x="0" y="125" width="800" height="100" fill="#f8fafc"/>

  <!-- Track 3 area -->
  <rect x="0" y="225" width="800" height="1" fill="#e2e8f0"/>
  <rect x="0" y="226" width="800" height="100" fill="#f8fafc"/>

  <!-- === GROUP 1 Bounding Box === -->
  <rect x="55" y="30" width="400" height="200" rx="10" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="8 5"/>
  <!-- Group Label -->
  <rect x="195" y="22" width="120" height="20" rx="10" fill="#8b5cf6"/>
  <text x="255" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white" font-weight="600">Group 1</text>

  <!-- Grouped Clip A — Track 1 -->
  <rect x="70" y="40" width="200" height="74" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <path d="M80,77 Q100,58 120,75 Q140,90 160,68 Q180,55 200,77 Q220,90 240,72 Q255,60 262,77" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M80,77 Q100,95 120,79 Q140,64 160,85 Q180,98 200,77 Q220,64 240,82 Q255,92 262,77" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="80" y="106" font-family="system-ui, sans-serif" font-size="9" fill="#7c3aed" font-weight="500">Vocal A</text>

  <!-- Grouped Clip B — Track 1 -->
  <rect x="290" y="40" width="150" height="74" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <path d="M300,77 Q318,60 336,75 Q354,88 372,68 Q390,56 408,77 Q420,85 432,77" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M300,77 Q318,93 336,79 Q354,66 372,85 Q390,96 408,77 Q420,69 432,77" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="300" y="106" font-family="system-ui, sans-serif" font-size="9" fill="#7c3aed" font-weight="500">Vocal B</text>

  <!-- Grouped Clip C — Track 2 -->
  <rect x="70" y="135" width="370" height="74" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <path d="M80,172 Q110,152 140,170 Q170,186 200,164 Q230,150 260,172 Q290,186 320,168 Q350,154 380,172 Q400,180 430,172" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M80,172 Q110,190 140,174 Q170,158 200,180 Q230,194 260,172 Q290,158 320,176 Q350,190 380,172 Q400,164 430,172" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="80" y="201" font-family="system-ui, sans-serif" font-size="9" fill="#7c3aed" font-weight="500">Harmony</text>

  <!-- === UNGROUPED Clip — Track 3, faded === -->
  <rect x="520" y="236" width="220" height="74" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" opacity="0.5"/>
  <path d="M530,273 Q555,256 580,271 Q605,285 630,266 Q655,254 680,273 Q700,282 730,273" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M530,273 Q555,290 580,275 Q605,261 630,280 Q655,292 680,273 Q700,264 730,273" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.3"/>
  <text x="530" y="302" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" opacity="0.5">SFX (ungrouped)</text>

  <!-- Link icon between grouped clips -->
  <circle cx="475" cy="120" r="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <path d="M469,117 Q472,114 475,114 Q478,114 481,117" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M469,123 Q472,126 475,126 Q478,126 481,123" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="468" y1="120" x2="482" y2="120" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Label -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Clip grouping across multiple tracks</text>
</svg>