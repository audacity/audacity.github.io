<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="300" rx="8" fill="#f8fafc"/>

  <!-- Timeline Ruler -->
  <rect x="0" y="0" width="800" height="24" rx="8" fill="#e2e8f0"/>
  <rect x="0" y="16" width="800" height="8" fill="#e2e8f0"/>
  <text x="80" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:00</text>
  <text x="230" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:05</text>
  <text x="380" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:10</text>
  <text x="530" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:15</text>
  <text x="680" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:20</text>

  <!-- Track area -->
  <rect x="0" y="24" width="800" height="230" fill="#f8fafc"/>

  <!-- Left clip (after split) -->
  <rect x="100" y="55" width="280" height="100" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Left waveform -->
  <path d="M115,105 Q135,80 155,102 Q175,120 195,90 Q215,75 235,105 Q255,120 275,92 Q295,78 315,105 Q335,118 355,100 Q365,95 375,105" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M115,105 Q135,128 155,108 Q175,88 195,118 Q215,132 235,105 Q255,88 275,116 Q295,130 315,105 Q335,92 355,110 Q365,115 375,105" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.8"/>
  <text x="115" y="147" font-family="system-ui, sans-serif" font-size="9" fill="#b45309" font-weight="500">Clip A</text>

  <!-- Right clip (after split) -->
  <rect x="395" y="55" width="300" height="100" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Right waveform -->
  <path d="M405,105 Q425,82 445,103 Q465,118 485,88 Q505,74 525,105 Q545,120 565,90 Q585,76 605,105 Q625,118 645,95 Q665,82 685,105" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M405,105 Q425,126 445,107 Q465,90 485,120 Q505,134 525,105 Q545,88 565,118 Q585,132 605,105 Q625,90 645,113 Q665,126 685,105" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.8"/>
  <text x="410" y="147" font-family="system-ui, sans-serif" font-size="9" fill="#b45309" font-weight="500">Clip B</text>

  <!-- Split line -->
  <line x1="388" y1="30" x2="388" y2="240" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Split gap highlight -->
  <rect x="380" y="55" width="15" height="100" fill="#fef2f2" opacity="0.6"/>

  <!-- Cursor / scissors icon at split point -->
  <circle cx="388" cy="38" r="10" fill="#ef4444"/>
  <!-- Scissors icon -->
  <line x1="383" y1="34" x2="388" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="393" y1="34" x2="388" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="382" cy="33" r="2.5" fill="none" stroke="white" stroke-width="1"/>
  <circle cx="394" cy="33" r="2.5" fill="none" stroke="white" stroke-width="1"/>

  <!-- Arrow annotations showing the split -->
  <line x1="388" y1="175" x2="340" y2="195" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="340,190 335,200 345,198" fill="#ef4444"/>
  <line x1="388" y1="175" x2="436" y2="195" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="436,190 441,200 431,198" fill="#ef4444"/>

  <!-- Split action label -->
  <rect x="338" y="205" width="100" height="24" rx="12" fill="#ef4444"/>
  <text x="388" y="221" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="600">Split at cursor</text>

  <!-- Keyboard shortcut hint -->
  <rect x="330" y="238" width="116" height="22" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="388" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="500">Ctrl + I</text>

  <!-- Label -->
  <text x="400" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Non-destructive clip splitting</text>
</svg>