<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="300" rx="8" fill="#f8fafc"/>

  <!-- Timeline Ruler -->
  <rect x="0" y="0" width="800" height="24" rx="8" fill="#e2e8f0"/>
  <rect x="0" y="16" width="800" height="8" fill="#e2e8f0"/>
  <text x="60" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:00</text>
  <text x="200" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:05</text>
  <text x="340" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:10</text>
  <text x="480" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:15</text>
  <text x="620" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">0:20</text>

  <!-- Track area -->
  <rect x="0" y="24" width="800" height="230" fill="#f8fafc"/>

  <!-- Original clip — faded with dashed outline -->
  <rect x="180" y="50" width="240" height="100" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Original waveform faded -->
  <path d="M190,100 Q210,75 230,98 Q250,118 270,85 Q290,70 310,100 Q330,118 350,88 Q370,72 390,100 Q400,108 410,100" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M190,100 Q210,122 230,102 Q250,82 270,112 Q290,128 310,100 Q330,82 350,110 Q370,125 390,100 Q400,92 410,100" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.35"/>
  <text x="300" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" opacity="0.6">Original length</text>

  <!-- Stretched clip — active -->
  <rect x="130" y="50" width="380" height="100" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <!-- Stretched waveform -->
  <path d="M145,100 Q165,78 185,97 Q205,114 225,88 Q245,74 265,100 Q285,115 305,90 Q325,76 345,100 Q365,114 385,92 Q405,78 425,100 Q445,112 465,94 Q485,80 500,100" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.85"/>
  <path d="M145,100 Q165,120 185,103 Q205,86 225,110 Q245,124 265,100 Q285,85 305,108 Q325,122 345,100 Q365,86 385,106 Q405,120 425,100 Q445,88 465,106 Q485,118 500,100" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.85"/>

  <!-- Left drag handle -->
  <rect x="122" y="75" width="16" height="50" rx="4" fill="#2563eb"/>
  <line x1="128" y1="92" x2="128" y2="108" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="132" y1="92" x2="132" y2="108" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left arrow -->
  <line x1="118" y1="100" x2="80" y2="100" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <polygon points="80,94 68,100 80,106" fill="#2563eb"/>

  <!-- Right drag handle -->
  <rect x="502" y="75" width="16" height="50" rx="4" fill="#2563eb"/>
  <line x1="508" y1="92" x2="508" y2="108" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="512" y1="92" x2="512" y2="108" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right arrow -->
  <line x1="522" y1="100" x2="560" y2="100" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <polygon points="560,94 572,100 560,106" fill="#2563eb"/>

  <!-- Speed indicator -->
  <rect x="290" y="160" width="80" height="26" rx="13" fill="#2563eb"/>
  <text x="330" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="600">0.63x</text>

  <!-- Dimension annotations -->
  <!-- Original width marker -->
  <line x1="180" y1="205" x2="420" y2="205" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="180" y1="200" x2="180" y2="210" stroke="#94a3b8" stroke-width="1"/>
  <line x1="420" y1="200" x2="420" y2="210" stroke="#94a3b8" stroke-width="1"/>
  <text x="300" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Original: 10s</text>

  <!-- Stretched width marker -->
  <line x1="130" y1="235" x2="510" y2="235" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="130" y1="230" x2="130" y2="240" stroke="#2563eb" stroke-width="1"/>
  <line x1="510" y1="230" x2="510" y2="240" stroke="#2563eb" stroke-width="1"/>
  <text x="320" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#2563eb" font-weight="600">Stretched: 16s</text>

  <!-- Label -->
  <text x="400" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Clip-based time stretching with drag handles</text>
</svg>